<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Encoder Gear Drive</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #04040f;
    color: #8aaccc;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    overflow: hidden;
  }
  header {
    padding: 7px 16px;
    border-bottom: 1px solid #0e1428;
    background: #060814;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .title { color: #c8ddf0; font-size: 11px; letter-spacing: 2px; }
  .badge { color: #1e2a40; font-size: 9px; letter-spacing: 1px; }
  .spacer { flex: 1; }
  .counter { text-align: right; }
  .cv  { font-size: 15px; letter-spacing: 1px; }
  .cl  { font-size: 8px; opacity: 0.4; letter-spacing: 1.5px; }
  #hL  { color: #00e5ff; text-shadow: 0 0 8px #00e5ff44; }
  #hR  { color: #ff8c00; text-shadow: 0 0 8px #ff8c0044; }

  .disc-area { overflow: hidden; }
  #c { display: block; width: 100%; height: 100%; }

  .scope-area { height: 72px; border-top: 1px solid #0e1428; overflow: hidden; }
  #sc { display: block; width: 100%; height: 100%; }

  .controls {
    display: flex;
    background: #060814;
    border-top: 1px solid #0e1428;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .ctrl {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; border-right: 1px solid #0e1428; flex-shrink: 0;
  }
  .ctrl:last-child { border-right: none; }
  .lbl { font-size: 9px; letter-spacing: 1.5px; opacity: 0.45; white-space: nowrap; }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    height: 2px; background: #161e30; outline: none; cursor: pointer; width: 80px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 9px; height: 9px;
    border-radius: 50%; background: #c8ddf0; cursor: pointer;
  }
  .vl { font-size: 11px; color: #c8ddf0; min-width: 34px; text-align: right; }
  #sl::-webkit-slider-thumb { background: #00e5ff; }
  #sr::-webkit-slider-thumb { background: #ff8c00; }
  #gr::-webkit-slider-thumb { background: #a0c060; }
</style>
</head>
<body>

<header>
  <span class="title">QUADRATURE ENCODER</span>
  <span class="badge">GEAR DRIVE · AB</span>
  <div class="spacer"></div>
  <div class="counter">
    <div class="cv" id="hL">+000000</div>
    <div class="cl">LEFT TICKS</div>
  </div>
  <div class="counter" style="margin-left:14px">
    <div class="cv" id="hR">+000000</div>
    <div class="cl">RIGHT TICKS</div>
  </div>
</header>

<div class="disc-area"><canvas id="c"></canvas></div>
<div class="scope-area"><canvas id="sc"></canvas></div>

<div class="controls">
  <div class="ctrl">
    <span class="lbl" style="color:#00e5ff88">L SPEED</span>
    <input type="range" id="sl" min="-4" max="4" step="0.05" value="1.8">
    <span class="vl" id="sl-v">1.80</span>
  </div>
  <div class="ctrl">
    <span class="lbl" style="color:#ff8c0088">R SPEED</span>
    <input type="range" id="sr" min="-4" max="4" step="0.05" value="2.5">
    <span class="vl" id="sr-v">2.50</span>
  </div>
  <div class="ctrl">
    <span class="lbl">CPR</span>
    <input type="range" id="cpr" min="4" max="24" step="1" value="10" style="width:60px">
    <span class="vl" id="cpr-v">10</span>
  </div>
  <div class="ctrl">
    <span class="lbl" style="color:#a0c06088">GEAR RATIO</span>
    <input type="range" id="gr" min="1" max="6" step="0.5" value="3">
    <span class="vl" id="gr-v">3.0×</span>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let omegaL = 1.8, omegaR = 2.5, CPR = 10, GEAR_RATIO = 3
let wheelAngleL = 0, wheelAngleR = 0
let encAngleL   = 0, encAngleR  = 0
let ticksL = 0, ticksR = 0
let prevEncL = 0, prevEncR = 0
let lastT = null

const SCOPE_LEN = 500
const bufs = { LA: [], LB: [], RA: [], RB: [] }
const SA =  Math.PI / 10
const SB = -Math.PI / 10

// Sensor matches slot half-width (Math.PI / cpr * 0.5)
function sensorHigh(worldAngle, discAngle, cpr) {
  const local  = ((worldAngle - discAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2)
  const period = Math.PI * 2 / cpr
  const phase  = local % period
  const halfW  = Math.PI / cpr * 0.5
  return phase < halfW || phase > period - halfW
}

// Controls
function wire(id, vid, set, fmt) {
  const el = document.getElementById(id), vl = document.getElementById(vid)
  el.addEventListener('input', () => { set(+el.value); vl.textContent = fmt(+el.value) })
}
wire('sl',  'sl-v',  v => omegaL      = v, v => v.toFixed(2))
wire('sr',  'sr-v',  v => omegaR      = v, v => v.toFixed(2))
wire('cpr', 'cpr-v', v => CPR         = v, v => String(v))
wire('gr',  'gr-v',  v => GEAR_RATIO  = v, v => v.toFixed(1) + '×')

// Canvases
const canvas = document.getElementById('c'),   ctx  = canvas.getContext('2d')
const scope  = document.getElementById('sc'),  sctx = scope.getContext('2d')

function resize() {
  const dpr = window.devicePixelRatio || 1
  canvas.width  = canvas.parentElement.offsetWidth  * dpr
  canvas.height = canvas.parentElement.offsetHeight * dpr
  scope.width   = scope.parentElement.offsetWidth   * dpr
  scope.height  = scope.parentElement.offsetHeight  * dpr
}
window.addEventListener('resize', resize)
resize()

// ── Gear path ─────────────────────────────────────────────────────────────────
// Draws a gear outline. R = pitch/tip radius, Ri = root radius, N = tooth count.
function gearPath(cx, cy, R, N, angle) {
  const Ri    = R * 0.78
  const pitch = Math.PI * 2 / N
  const tw    = pitch * 0.32   // tooth half-width (angular)

  ctx.beginPath()
  for (let i = 0; i < N; i++) {
    const c = angle + i * pitch
    // Root arc → leading tooth face
    ctx.arc(cx, cy, Ri, c - pitch * 0.5, c - tw, false)
    // Up to tip
    ctx.lineTo(cx + R * Math.cos(c - tw), cy + R * Math.sin(c - tw))
    // Tip arc
    ctx.arc(cx, cy, R, c - tw, c + tw, false)
    // Down to root
    ctx.lineTo(cx + Ri * Math.cos(c + tw), cy + Ri * Math.sin(c + tw))
  }
  ctx.closePath()
}

// ── Draw wheel ────────────────────────────────────────────────────────────────
function drawWheel(cx, cy, R, angle, driveR, driveN, driveAngle, col) {
  // Tire
  const tireGrd = ctx.createRadialGradient(cx, cy, R * 0.75, cx, cy, R)
  tireGrd.addColorStop(0, '#181828')
  tireGrd.addColorStop(1, '#0a0a18')
  ctx.fillStyle = tireGrd
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill()

  // Tread dashes (rotate with wheel)
  const nTread = Math.round(R * 0.55)
  ctx.save()
  ctx.translate(cx, cy); ctx.rotate(angle)
  ctx.strokeStyle = '#0e0e22'; ctx.lineWidth = R * 0.07
  ctx.setLineDash([R * 0.12, R * 0.12])
  ctx.beginPath(); ctx.arc(0, 0, R * 0.94, 0, Math.PI * 2); ctx.stroke()
  ctx.setLineDash([])
  ctx.restore()

  // Rim circle
  ctx.fillStyle = '#1c1c38'
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.80, 0, Math.PI * 2); ctx.fill()
  ctx.strokeStyle = '#252545'; ctx.lineWidth = 1
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.80, 0, Math.PI * 2); ctx.stroke()

  // Spokes (5, rotate with wheel)
  ctx.save()
  ctx.translate(cx, cy); ctx.rotate(angle)
  ctx.strokeStyle = '#22264a'
  ctx.lineWidth   = R * 0.06
  ctx.lineCap     = 'round'
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2
    ctx.beginPath()
    ctx.moveTo(Math.cos(a) * R * 0.16, Math.sin(a) * R * 0.16)
    ctx.lineTo(Math.cos(a) * R * 0.68, Math.sin(a) * R * 0.68)
    ctx.stroke()
  }
  ctx.lineCap = 'butt'
  ctx.restore()

  // Hub cap
  ctx.fillStyle = '#12122a'
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.18, 0, Math.PI * 2); ctx.fill()
  ctx.strokeStyle = '#2a2a4a'; ctx.lineWidth = 1
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.18, 0, Math.PI * 2); ctx.stroke()

  // Drive gear (at hub, same rotation as wheel)
  const dGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, driveR)
  dGrd.addColorStop(0, '#28304a')
  dGrd.addColorStop(1, '#181e30')
  gearPath(cx, cy, driveR, driveN, driveAngle)
  ctx.fillStyle = dGrd; ctx.fill()
  ctx.strokeStyle = col + '66'; ctx.lineWidth = 1; ctx.stroke()

  // Gear centre bolt
  ctx.fillStyle = '#0e1020'
  ctx.beginPath(); ctx.arc(cx, cy, driveR * 0.18, 0, Math.PI * 2); ctx.fill()
  ctx.strokeStyle = '#303050'; ctx.lineWidth = 1
  ctx.beginPath(); ctx.arc(cx, cy, driveR * 0.18, 0, Math.PI * 2); ctx.stroke()
}

// ── Draw encoder gear + disc ──────────────────────────────────────────────────
function drawEncoder(cx, cy, R, encN, encAngle, cpr, hiA, hiB, dim, bright, dimB, brightB) {
  const RSLOT = R * 0.88
  const RI    = R * 0.30
  const RH    = R * 0.09

  // Gear body
  const gGrd = ctx.createRadialGradient(cx, cy, 0, cx, cy, R)
  gGrd.addColorStop(0, '#202040')
  gGrd.addColorStop(1, '#141428')
  gearPath(cx, cy, R, encN, encAngle)
  ctx.fillStyle = gGrd; ctx.fill()
  ctx.strokeStyle = bright + '55'; ctx.lineWidth = 1; ctx.stroke()

  // Disc slots drawn over gear face
  ctx.fillStyle = '#0a0a1e'
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.78, 0, Math.PI * 2); ctx.fill()

  for (let i = 0; i < cpr; i++) {
    const c  = encAngle + (i / cpr) * Math.PI * 2
    const a0 = c - Math.PI / cpr * 0.5
    const a1 = c + Math.PI / cpr * 0.5
    ctx.beginPath()
    ctx.moveTo(cx + Math.cos(a0) * RI, cy + Math.sin(a0) * RI)
    ctx.arc(cx, cy, RSLOT, a0, a1)
    ctx.arc(cx, cy, RI, a1, a0, true)
    ctx.closePath()
    ctx.fillStyle   = '#1e35cc'
    ctx.fill()
    ctx.strokeStyle = '#2a48e8'; ctx.lineWidth = 0.7; ctx.stroke()
  }

  // Sensors
  const Rm = (RSLOT + RI) / 2
  drawSensor(cx, cy, SA, Rm, dim,  bright,  hiA, 'A', R * 0.78)
  drawSensor(cx, cy, SB, Rm, dimB, brightB, hiB, 'B', R * 0.78)

  // Hub
  ctx.fillStyle = '#07071a'
  ctx.beginPath(); ctx.arc(cx, cy, RI, 0, Math.PI * 2); ctx.fill()
  ctx.fillStyle = '#101028'
  ctx.beginPath(); ctx.arc(cx, cy, RH, 0, Math.PI * 2); ctx.fill()
  ctx.strokeStyle = '#1e2040'; ctx.lineWidth = 1
  ctx.beginPath(); ctx.arc(cx, cy, RH, 0, Math.PI * 2); ctx.stroke()
}

function drawSensor(cx, cy, worldAngle, r, dimCol, brightCol, active, label, R) {
  const sx = cx + Math.cos(worldAngle) * r
  const sy = cy + Math.sin(worldAngle) * r
  const sr = R * 0.064

  if (active) { ctx.shadowColor = brightCol; ctx.shadowBlur = 14 }
  ctx.fillStyle   = active ? brightCol : dimCol
  ctx.strokeStyle = active ? brightCol : '#1a2440'
  ctx.lineWidth   = active ? 1.5 : 0.8
  ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill(); ctx.stroke()
  ctx.shadowBlur  = 0
  if (active) {
    ctx.fillStyle = 'rgba(255,255,255,0.22)'
    ctx.beginPath(); ctx.arc(sx - sr * 0.28, sy - sr * 0.30, sr * 0.36, 0, Math.PI * 2); ctx.fill()
  }
  const lx = cx + Math.cos(worldAngle) * r * 1.38
  const ly = cy + Math.sin(worldAngle) * r * 1.38
  ctx.font = `bold ${R * 0.10}px 'Share Tech Mono', monospace`
  ctx.fillStyle    = active ? brightCol : '#253040'
  ctx.textAlign    = 'center'; ctx.textBaseline = 'middle'
  ctx.fillText(label, lx, ly)
}

// ── Draw scope ────────────────────────────────────────────────────────────────
function drawScope() {
  const W = scope.width, H = scope.height
  const dpr = window.devicePixelRatio || 1
  sctx.fillStyle = '#020208'; sctx.fillRect(0, 0, W, H)

  sctx.strokeStyle = '#090f1e'; sctx.lineWidth = 1
  for (let i = 1; i < 4; i++) {
    sctx.beginPath(); sctx.moveTo(0, i/4*H); sctx.lineTo(W, i/4*H); sctx.stroke()
  }
  sctx.strokeStyle = '#111828'; sctx.lineWidth = 1.5
  sctx.beginPath(); sctx.moveTo(0, H/2); sctx.lineTo(W, H/2); sctx.stroke()

  const chs = [
    { key: 'LA', color: '#00e5ff', y0: 0     },
    { key: 'LB', color: '#0055dd', y0: H/4   },
    { key: 'RA', color: '#ff8c00', y0: H/2   },
    { key: 'RB', color: '#dd2200', y0: 3*H/4 },
  ]
  chs.forEach(({ key, color, y0 }) => {
    const buf = bufs[key], mid = y0 + H/8, amp = H * 0.075
    sctx.font = `${9*dpr}px 'Share Tech Mono', monospace`
    sctx.fillStyle = color + '55'; sctx.textAlign = 'left'; sctx.textBaseline = 'middle'
    sctx.fillText(key, 4*dpr, mid)
    if (buf.length < 2) return
    sctx.shadowColor = color; sctx.shadowBlur = 3
    sctx.strokeStyle = color; sctx.lineWidth = 1.3 * dpr
    sctx.beginPath()
    buf.forEach((hi, i) => {
      const x = i / (SCOPE_LEN-1) * W, y = hi ? mid-amp : mid+amp
      if (i === 0) { sctx.moveTo(x, y); return }
      if (buf[i-1] !== hi) { sctx.lineTo(x, buf[i-1] ? mid-amp : mid+amp) }
      sctx.lineTo(x, y)
    })
    sctx.stroke(); sctx.shadowBlur = 0
  })
}

// ── Layout helper ─────────────────────────────────────────────────────────────
// Returns geometry for one wheel+encoder assembly.
// side: -1 = left half of canvas, +1 = right half
function layout(W, H, side) {
  // Encoder gear radius: fixed fraction of height
  const encR  = Math.min(H * 0.20, W * 0.09)
  // Drive gear is gearRatio × larger (in radius)
  const drvR  = encR * GEAR_RATIO
  // Wheel is slightly larger than drive gear
  const whlR  = drvR * 1.18

  // Number of teeth (keep proportional so they interleave visually)
  const encN  = Math.max(8, Math.round(encR * 0.55))
  const drvN  = Math.round(encN * GEAR_RATIO)

  // Horizontal centres
  // We want wheel + drive gear + gap + encoder gear to fit in half the canvas
  const halfW = W / 2
  const totalSpan = whlR + drvR + encR   // rough width
  const scale = Math.min(1.0, (halfW * 0.82) / totalSpan)

  const wR = whlR * scale
  const dR = drvR * scale
  const eR = encR * scale

  // Place encoder gear first (rightmost of its half), then work left
  const margin = W * 0.04
  const encCX = side < 0
    ? halfW - eR - margin
    : W - eR - margin
  const whlCX = encCX - eR - dR * 2

  const cy = H / 2

  return { whlCX, encCX, cy, wR, dR, eR, wN: Math.round(drvN), eN: Math.round(encN) }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop)
  const dt = lastT !== null ? Math.min((ts - lastT) / 1000, 0.05) : 0
  lastT = ts

  // Advance angles
  wheelAngleL += omegaL * dt
  wheelAngleR += omegaR * dt
  // Encoder gear meshes externally → opposite direction, gear-ratio faster
  encAngleL   -= omegaL * GEAR_RATIO * dt
  encAngleR   -= omegaR * GEAR_RATIO * dt

  // Ticks from encoder angle change
  const dEncL = encAngleL - prevEncL
  const dEncR = encAngleR - prevEncR
  ticksL += Math.round(dEncL / (Math.PI * 2) * CPR * 4)
  ticksR += Math.round(dEncR / (Math.PI * 2) * CPR * 4)
  prevEncL = encAngleL; prevEncR = encAngleR

  // Sensor states (use absolute encoder angle for slot phase)
  const laHi = sensorHigh(SA, encAngleL, CPR)
  const lbHi = sensorHigh(SB, encAngleL, CPR)
  const raHi = sensorHigh(SA, encAngleR, CPR)
  const rbHi = sensorHigh(SB, encAngleR, CPR)

  ;[['LA', laHi], ['LB', lbHi], ['RA', raHi], ['RB', rbHi]].forEach(([k, v]) => {
    bufs[k].push(v); if (bufs[k].length > SCOPE_LEN) bufs[k].shift()
  })

  const fmt = n => (n >= 0 ? '+' : '') + String(Math.abs(Math.trunc(n))).padStart(6, '0')
  document.getElementById('hL').textContent = fmt(ticksL)
  document.getElementById('hR').textContent = fmt(ticksR)

  // ── Draw ────────────────────────────────────────────────────────────────────
  const dpr = window.devicePixelRatio || 1
  const W   = canvas.width, H = canvas.height

  ctx.fillStyle = '#04040f'; ctx.fillRect(0, 0, W, H)

  // Vignette
  const vgn = ctx.createRadialGradient(W/2, H/2, H*0.12, W/2, H/2, H*0.82)
  vgn.addColorStop(0, 'transparent'); vgn.addColorStop(1, 'rgba(0,0,0,0.45)')
  ctx.fillStyle = vgn; ctx.fillRect(0, 0, W, H)

  // Divider
  ctx.strokeStyle = '#0e1428'; ctx.lineWidth = 1
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke()

  // LEFT wheel assembly
  const L = layout(W, H, -1)
  drawWheelAssembly(L, wheelAngleL, encAngleL, CPR, laHi, lbHi,
    '#003560', '#00e5ff', '#001050', '#0066ff', 'LEFT', '#00e5ff')

  // RIGHT wheel assembly
  const R = layout(W, H, +1)
  const Ro = { ...R, whlCX: R.whlCX + W/2, encCX: R.encCX + W/2 }
  drawWheelAssembly(Ro, wheelAngleR, encAngleR, CPR, raHi, rbHi,
    '#5a2800', '#ff8c00', '#4a0800', '#dd2200', 'RIGHT', '#ff8c00')

  // Gear ratio label (centre)
  ctx.font = `${10 * dpr}px 'Share Tech Mono', monospace`
  ctx.textAlign = 'center'; ctx.textBaseline = 'top'
  ctx.fillStyle = '#a0c06088'
  ctx.fillText(`${GEAR_RATIO.toFixed(1)}×`, W/2, 8)

  drawScope()
}

function drawWheelAssembly(g, wheelAngle, encAngle, cpr, hiA, hiB, dimA, brightA, dimB, brightB, label, labelCol) {
  const dpr = window.devicePixelRatio || 1
  const { whlCX, encCX, cy, wR, dR, eR, wN, eN } = g

  // Mesh highlight line (subtle)
  ctx.strokeStyle = labelCol + '18'; ctx.lineWidth = dR * 0.06
  ctx.lineCap = 'round'
  ctx.beginPath(); ctx.moveTo(whlCX, cy); ctx.lineTo(encCX, cy); ctx.stroke()
  ctx.lineCap = 'butt'

  // Wheel with drive gear
  drawWheel(whlCX, cy, wR, wheelAngle, dR, wN, wheelAngle, labelCol)

  // Encoder gear + disc
  drawEncoder(encCX, cy, eR, eN, encAngle, cpr, hiA, hiB, dimA, brightA, dimB, brightB)

  // Mesh contact dot
  const mx = whlCX + dR + (encCX - whlCX - dR - eR) / 2 + eR
  const my = cy
  ctx.fillStyle = labelCol + '40'
  ctx.beginPath(); ctx.arc(mx, my, dR * 0.06, 0, Math.PI * 2); ctx.fill()

  // Labels
  const labelY = cy + Math.max(wR, eR) + 14
  ctx.font      = `${Math.round(Math.min(wR, eR) * 0.14)}px 'Share Tech Mono', monospace`
  ctx.textAlign = 'center'; ctx.textBaseline = 'top'
  ctx.fillStyle   = labelCol; ctx.shadowColor = labelCol; ctx.shadowBlur = 8
  ctx.fillText(label, (whlCX + encCX) / 2, labelY)
  ctx.shadowBlur = 0

  // Speed annotation under encoder gear
  const fs = Math.round(eR * 0.22)
  ctx.font      = `${fs}px 'Share Tech Mono', monospace`
  ctx.fillStyle = labelCol + '66'
  ctx.textAlign = 'center'
  ctx.fillText(`×${GEAR_RATIO.toFixed(1)} speed`, encCX, labelY)
}

requestAnimationFrame(loop)
</script>
</body>
</html>
