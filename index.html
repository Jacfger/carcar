<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PID Car Simulator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    header {
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 15px; font-weight: 600; color: #e94560; letter-spacing: 0.5px; }
    header .spacer { flex: 1; }

    .btn {
      padding: 5px 14px;
      border-radius: 4px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }
    .btn:hover { background: #1a4a80; }
    .btn.primary { background: #e94560; border-color: #e94560; color: #fff; }
    .btn.primary:hover { background: #c73652; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .main-layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      grid-template-rows: 1fr 260px;
      gap: 1px;
      background: #0f3460;
      overflow: hidden;
    }

    .panel {
      background: #1a1a2e;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      background: #16213e;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #7090b0;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      flex-shrink: 0;
    }

    /* Track canvas panel — spans both rows on the left */
    #track-panel {
      grid-row: 1 / 3;
      position: relative;
    }
    #track-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Telemetry panel — top right */
    #telemetry-panel {
      grid-column: 2;
      grid-row: 1;
    }
    #telemetry-canvas {
      display: block;
      width: 100%;
      flex: 1;
    }

    .telemetry-toggles {
      padding: 6px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-top: 1px solid #0f3460;
      flex-shrink: 0;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
    .toggle-row input[type=checkbox] { accent-color: #e94560; cursor: pointer; }
    .toggle-label { font-size: 11px; color: #a0b0c0; }

    /* Editor panel — bottom right */
    #editor-panel {
      grid-column: 2;
      grid-row: 2;
    }
    #editor-mount {
      flex: 1;
      min-height: 0;
    }

    /* Track selector */
    select {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a4a80;
      border-radius: 3px;
      padding: 3px 6px;
      font-size: 12px;
      cursor: pointer;
    }

    /* Error overlay */
    #error-display {
      position: absolute;
      bottom: 8px;
      left: 8px;
      right: 8px;
      background: rgba(233, 69, 96, 0.9);
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
      display: none;
      white-space: pre-wrap;
      max-height: 80px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <header>
    <h1>PID Car Simulator</h1>
    <select id="track-select">
      <option value="oval">Oval</option>
      <option value="figure8">Figure 8</option>
      <option value="chicane">Chicane</option>
    </select>
    <div class="spacer"></div>
    <button class="btn primary" id="btn-run">&#9654; Run</button>
    <button class="btn" id="btn-reset">&#8635; Reset</button>
    <button class="btn" id="btn-add-car">+ Car</button>
    <span id="car-count-label" style="font-size:11px;color:#7090b0;min-width:40px"></span>
  </header>

  <div class="main-layout">
    <div class="panel" id="track-panel">
      <canvas id="track-canvas"></canvas>
      <div id="error-display"></div>
    </div>

    <div class="panel" id="telemetry-panel">
      <div class="panel-header" style="display:flex;align-items:center;padding:0 0 0 10px;gap:0">
        <span style="font-size:11px;font-weight:600;color:#7090b0;text-transform:uppercase;letter-spacing:0.8px;margin-right:12px">Telemetry</span>
        <button id="tab-graphs"  style="font-size:10px;padding:4px 10px;border:none;border-bottom:2px solid #e94560;background:transparent;color:#e94560;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px">Graphs</button>
        <button id="tab-encoder" style="font-size:10px;padding:4px 10px;border:none;border-bottom:2px solid transparent;background:transparent;color:#7090b0;cursor:pointer;text-transform:uppercase;letter-spacing:0.5px">Encoder</button>
      </div>
      <canvas id="telemetry-canvas"></canvas>
      <div id="encoder-mount" style="display:none;flex:1;flex-direction:column;overflow:hidden;"></div>
      <div class="telemetry-toggles">
        <label class="toggle-row">
          <input type="checkbox" id="tog-variance" checked />
          <span class="toggle-label">Motor variance</span>
        </label>
        <label class="toggle-row">
          <input type="checkbox" id="tog-battery" checked />
          <span class="toggle-label">Battery drain</span>
        </label>
        <label class="toggle-row">
          <input type="checkbox" id="tog-caster" checked />
          <span class="toggle-label">Ball caster noise</span>
        </label>
        <label class="toggle-row">
          <input type="checkbox" id="tog-sensors" checked />
          <span class="toggle-label">Show sensors</span>
        </label>
        <div class="toggle-row speed-row">
          <span class="toggle-label">Max speed</span>
          <input type="range" id="speed-control" min="5" max="100" value="60" step="5" style="flex:1;accent-color:#e94560" />
          <span id="speed-value" style="font-size:11px;color:#e94560;min-width:32px;text-align:right">60%</span>
        </div>
        <div class="toggle-row" style="gap:6px">
          <span class="toggle-label">Encoder CPR</span>
          <input type="number" id="enc-cpr" value="20" min="1" max="128" step="1"
            style="width:46px;background:#0f3460;color:#e0e0e0;border:1px solid #1a4a80;border-radius:3px;padding:2px 4px;font-size:11px" />
          <span class="toggle-label" style="margin-left:6px">Gear ratio</span>
          <input type="number" id="enc-gear" value="3.0" min="0.1" max="20" step="0.1"
            style="width:40px;background:#0f3460;color:#e0e0e0;border:1px solid #1a4a80;border-radius:3px;padding:2px 4px;font-size:11px" />
        </div>
        <label class="toggle-row">
          <input type="checkbox" id="tog-enc-noise" />
          <span class="toggle-label">Encoder noise</span>
        </label>
      </div>
    </div>

    <div class="panel" id="editor-panel">
      <div class="panel-header">PID Code</div>
      <div id="editor-mount"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
