<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dual Encoder</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #04040f;
    color: #8aaccc;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    overflow: hidden;
  }
  header {
    padding: 7px 16px;
    border-bottom: 1px solid #0e1428;
    background: #060814;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 10px;
    letter-spacing: 1.2px;
    flex-shrink: 0;
  }
  .title { color: #c8ddf0; font-size: 11px; letter-spacing: 2px; }
  .badge { color: #1e2a40; font-size: 9px; }
  .spacer { flex: 1; }
  .counter { text-align: right; }
  .cv { font-size: 15px; letter-spacing: 1px; }
  #hL { color: #00e5ff; text-shadow: 0 0 8px #00e5ff44; }
  #hR { color: #ff8c00; text-shadow: 0 0 8px #ff8c0044; }
  .cl { font-size: 8px; opacity: 0.45; letter-spacing: 1.5px; }

  .disc-area { overflow: hidden; }
  #disc-canvas { display: block; width: 100%; height: 100%; }

  .scope-area {
    height: 76px;
    border-top: 1px solid #0e1428;
    overflow: hidden;
  }
  #scope-canvas { display: block; width: 100%; height: 100%; }

  .controls {
    display: flex;
    background: #060814;
    border-top: 1px solid #0e1428;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .ctrl {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    border-right: 1px solid #0e1428;
    flex-shrink: 0;
  }
  .ctrl:last-child { border-right: none; }
  .lbl { font-size: 9px; letter-spacing: 1.5px; opacity: 0.45; white-space: nowrap; }
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    height: 2px;
    background: #161e30;
    outline: none;
    cursor: pointer;
    width: 80px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #c8ddf0;
    cursor: pointer;
  }
  .vl { font-size: 11px; color: #c8ddf0; min-width: 34px; text-align: right; }
  #sl::-webkit-slider-thumb { background: #00e5ff; }
  #sr::-webkit-slider-thumb { background: #ff8c00; }
</style>
</head>
<body>

<header>
  <span class="title">QUADRATURE ENCODER</span>
  <span class="badge">AB · DUAL</span>
  <div class="spacer"></div>
  <div class="counter">
    <div class="cv" id="hL">+000000</div>
    <div class="cl">LEFT TICKS</div>
  </div>
  <div class="counter">
    <div class="cv" id="hR">+000000</div>
    <div class="cl">RIGHT TICKS</div>
  </div>
</header>

<div class="disc-area">
  <canvas id="disc-canvas"></canvas>
</div>

<div class="scope-area">
  <canvas id="scope-canvas"></canvas>
</div>

<div class="controls">
  <div class="ctrl">
    <span class="lbl" style="color:#00e5ff88">L SPEED</span>
    <input type="range" id="sl" min="-4" max="4" step="0.05" value="1.8">
    <span class="vl" id="sl-v">1.80</span>
  </div>
  <div class="ctrl">
    <span class="lbl" style="color:#ff8c0088">R SPEED</span>
    <input type="range" id="sr" min="-4" max="4" step="0.05" value="2.5">
    <span class="vl" id="sr-v">2.50</span>
  </div>
  <div class="ctrl">
    <span class="lbl">CPR</span>
    <input type="range" id="cpr" min="4" max="32" step="1" value="12" style="width:60px">
    <span class="vl" id="cpr-v">12</span>
  </div>
</div>

<script>
let omegaL = 1.8, omegaR = 2.5, CPR = 12
let angleL = 0, angleR = 0, ticksL = 0, ticksR = 0, prevL = 0, prevR = 0
let lastT  = null

const SCOPE_LEN = 500
const bufs = { LA: [], LB: [], RA: [], RB: [] }

const SA =  Math.PI / 10   // +18°  sensor A (fixed world position)
const SB = -Math.PI / 10   // −18°  sensor B

// ── Sensor logic — must match slot half-width below (Math.PI / cpr * 0.5) ──
function sensorHigh(worldAngle, discAngle, cpr) {
  const local  = ((worldAngle - discAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2)
  const period = Math.PI * 2 / cpr
  const phase  = local % period
  const halfW  = Math.PI / cpr * 0.5   // ← matches slot drawing
  return phase < halfW || phase > period - halfW
}

// Controls
function wire(id, vid, set, fmt) {
  const el = document.getElementById(id), vl = document.getElementById(vid)
  el.addEventListener('input', () => { set(+el.value); vl.textContent = fmt(+el.value) })
}
wire('sl',  'sl-v',  v => omegaL = v, v => v.toFixed(2))
wire('sr',  'sr-v',  v => omegaR = v, v => v.toFixed(2))
wire('cpr', 'cpr-v', v => CPR    = v, v => String(v))

// Canvases
const discCanvas  = document.getElementById('disc-canvas')
const dctx        = discCanvas.getContext('2d')
const scopeCanvas = document.getElementById('scope-canvas')
const sctx        = scopeCanvas.getContext('2d')

function resize() {
  const dpr = window.devicePixelRatio || 1
  discCanvas.width   = discCanvas.parentElement.offsetWidth  * dpr
  discCanvas.height  = discCanvas.parentElement.offsetHeight * dpr
  scopeCanvas.width  = scopeCanvas.parentElement.offsetWidth  * dpr
  scopeCanvas.height = scopeCanvas.parentElement.offsetHeight * dpr
}
window.addEventListener('resize', resize)
resize()

// ── Draw one disc ─────────────────────────────────────────────────────────────
function drawDisc(cx, cy, R, angle, cpr, hiA, hiB, dimA, brightA, dimB, brightB) {
  const ctx   = dctx
  const RSLOT = R * 0.88
  const RI    = R * 0.30
  const RH    = R * 0.09

  // Subtle outer glow
  const grd = ctx.createRadialGradient(cx, cy, R * 0.5, cx, cy, R * 1.2)
  grd.addColorStop(0, 'rgba(20,40,120,0)')
  grd.addColorStop(1, 'rgba(10,20,80,0.10)')
  ctx.fillStyle = grd
  ctx.beginPath(); ctx.arc(cx, cy, R * 1.15, 0, Math.PI * 2); ctx.fill()

  // Body
  ctx.fillStyle = '#0f1028'
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill()

  // Slots — half-width MUST match halfW in sensorHigh()
  for (let i = 0; i < cpr; i++) {
    const c  = angle + (i / cpr) * Math.PI * 2
    const a0 = c - Math.PI / cpr * 0.5
    const a1 = c + Math.PI / cpr * 0.5
    ctx.beginPath()
    ctx.moveTo(cx + Math.cos(a0) * RI, cy + Math.sin(a0) * RI)
    ctx.arc(cx, cy, RSLOT, a0, a1)
    ctx.arc(cx, cy, RI, a1, a0, true)
    ctx.closePath()
    ctx.fillStyle   = '#1e35cc'
    ctx.fill()
    ctx.strokeStyle = '#2a48e8'
    ctx.lineWidth   = 0.7
    ctx.stroke()
  }

  // Sensors
  const Rm = (RSLOT + RI) / 2
  drawSensor(cx, cy, SA, Rm, dimA, brightA, hiA, 'A', R)
  drawSensor(cx, cy, SB, Rm, dimB, brightB, hiB, 'B', R)

  // Hub
  ctx.fillStyle = '#070714'
  ctx.beginPath(); ctx.arc(cx, cy, RI, 0, Math.PI * 2); ctx.fill()
  ctx.fillStyle = '#101024'
  ctx.beginPath(); ctx.arc(cx, cy, RH, 0, Math.PI * 2); ctx.fill()
  ctx.strokeStyle = '#1e2040'; ctx.lineWidth = 1
  ctx.beginPath(); ctx.arc(cx, cy, RH, 0, Math.PI * 2); ctx.stroke()

  // Ring
  ctx.strokeStyle = '#1a2848'; ctx.lineWidth = 1.5
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.stroke()
}

function drawSensor(cx, cy, worldAngle, r, dimCol, brightCol, active, label, R) {
  const ctx = dctx
  const sx  = cx + Math.cos(worldAngle) * r
  const sy  = cy + Math.sin(worldAngle) * r
  const sr  = R * 0.050

  if (active) { ctx.shadowColor = brightCol; ctx.shadowBlur = 16 }
  ctx.fillStyle   = active ? brightCol : dimCol
  ctx.strokeStyle = active ? brightCol : '#1a2440'
  ctx.lineWidth   = active ? 1.5 : 0.8
  ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill(); ctx.stroke()
  ctx.shadowBlur  = 0

  if (active) {
    ctx.fillStyle = 'rgba(255,255,255,0.22)'
    ctx.beginPath(); ctx.arc(sx - sr * 0.28, sy - sr * 0.30, sr * 0.36, 0, Math.PI * 2); ctx.fill()
  }

  const lx = cx + Math.cos(worldAngle) * r * 1.36
  const ly = cy + Math.sin(worldAngle) * r * 1.36
  ctx.font         = `bold ${R * 0.085}px 'Share Tech Mono', monospace`
  ctx.fillStyle    = active ? brightCol : '#253040'
  ctx.textAlign    = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText(label, lx, ly)
}

// ── Draw scope ────────────────────────────────────────────────────────────────
function drawScope() {
  const ctx = sctx
  const W = scopeCanvas.width, H = scopeCanvas.height
  const dpr = window.devicePixelRatio || 1

  ctx.fillStyle = '#020208'; ctx.fillRect(0, 0, W, H)

  // Grid lines
  ctx.strokeStyle = '#090f1e'; ctx.lineWidth = 1
  for (let i = 1; i < 4; i++) {
    ctx.beginPath(); ctx.moveTo(0, i/4*H); ctx.lineTo(W, i/4*H); ctx.stroke()
  }

  // Mid-line separating L and R groups
  ctx.strokeStyle = '#111828'; ctx.lineWidth = 1.5
  ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke()

  const channels = [
    { key: 'LA', color: '#00e5ff', y0: 0    },
    { key: 'LB', color: '#0055dd', y0: H/4  },
    { key: 'RA', color: '#ff8c00', y0: H/2  },
    { key: 'RB', color: '#dd2200', y0: 3*H/4},
  ]

  channels.forEach(({ key, color, y0 }) => {
    const buf = bufs[key]
    const mid = y0 + H / 8
    const amp = H * 0.075

    ctx.font = `${9*dpr}px 'Share Tech Mono', monospace`
    ctx.fillStyle    = color + '55'
    ctx.textAlign    = 'left'
    ctx.textBaseline = 'middle'
    ctx.fillText(key, 4*dpr, mid)

    if (buf.length < 2) return

    ctx.shadowColor = color; ctx.shadowBlur = 3
    ctx.strokeStyle = color; ctx.lineWidth = 1.3 * dpr
    ctx.beginPath()
    let prev = null
    buf.forEach((hi, i) => {
      const x = i / (SCOPE_LEN - 1) * W
      const y = hi ? mid - amp : mid + amp
      if (i === 0) { ctx.moveTo(x, y); return }
      if (prev !== hi) {
        ctx.lineTo(x, prev ? mid - amp : mid + amp)
        ctx.lineTo(x, y)
      } else {
        ctx.lineTo(x, y)
      }
      prev = hi
    }, prev = buf[0])
    ctx.stroke()
    ctx.shadowBlur = 0
  })
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop)
  const dt = lastT !== null ? Math.min((ts - lastT) / 1000, 0.05) : 0
  lastT = ts

  prevL = angleL; prevR = angleR
  angleL += omegaL * dt
  angleR += omegaR * dt
  ticksL += Math.round((angleL - prevL) / (Math.PI * 2) * CPR * 4)
  ticksR += Math.round((angleR - prevR) / (Math.PI * 2) * CPR * 4)

  const laHi = sensorHigh(SA, angleL, CPR)
  const lbHi = sensorHigh(SB, angleL, CPR)
  const raHi = sensorHigh(SA, angleR, CPR)
  const rbHi = sensorHigh(SB, angleR, CPR)

  ;[['LA', laHi], ['LB', lbHi], ['RA', raHi], ['RB', rbHi]].forEach(([k, v]) => {
    bufs[k].push(v); if (bufs[k].length > SCOPE_LEN) bufs[k].shift()
  })

  const fmt = n => (n >= 0 ? '+' : '') + String(Math.abs(Math.trunc(n))).padStart(6, '0')
  document.getElementById('hL').textContent = fmt(ticksL)
  document.getElementById('hR').textContent = fmt(ticksR)

  // ── Draw ──────────────────────────────────────────────────────────────────
  const dpr = window.devicePixelRatio || 1
  const W = discCanvas.width, H = discCanvas.height

  dctx.fillStyle = '#04040f'; dctx.fillRect(0, 0, W, H)

  // Vignette
  const vgn = dctx.createRadialGradient(W/2, H/2, H*0.15, W/2, H/2, H*0.85)
  vgn.addColorStop(0, 'transparent')
  vgn.addColorStop(1, 'rgba(0,0,0,0.45)')
  dctx.fillStyle = vgn; dctx.fillRect(0, 0, W, H)

  const R   = Math.min(H * 0.38, W * 0.20)
  const cy  = H / 2
  const gap = R * 0.28
  const cxL = W / 2 - gap - R
  const cxR = W / 2 + gap + R

  // Axle
  const ag = dctx.createLinearGradient(0, cy - R*0.04, 0, cy + R*0.04)
  ag.addColorStop(0, '#2a3a55'); ag.addColorStop(0.5, '#3a5070'); ag.addColorStop(1, '#141e2e')
  dctx.strokeStyle = ag
  dctx.lineWidth   = R * 0.065
  dctx.lineCap     = 'round'
  dctx.beginPath(); dctx.moveTo(cxL, cy); dctx.lineTo(cxR, cy); dctx.stroke()
  dctx.lineCap = 'butt'

  drawDisc(cxL, cy, R, angleL, CPR, laHi, lbHi,
    '#003560', '#00e5ff',   // A: dim, bright
    '#001050', '#0066ff')   // B: dim, bright

  drawDisc(cxR, cy, R, angleR, CPR, raHi, rbHi,
    '#5a2800', '#ff8c00',
    '#4a0800', '#dd2200')

  // Labels
  dctx.font = `${Math.round(R * 0.11)}px 'Share Tech Mono', monospace`
  dctx.textAlign = 'center'; dctx.textBaseline = 'top'

  dctx.fillStyle = '#00e5ff'; dctx.shadowColor = '#00e5ff'; dctx.shadowBlur = 8
  dctx.fillText('LEFT', cxL, cy + R + 10)
  dctx.fillStyle = '#ff8c00'; dctx.shadowColor = '#ff8c00'
  dctx.fillText('RIGHT', cxR, cy + R + 10)
  dctx.shadowBlur = 0

  drawScope()
}

requestAnimationFrame(loop)
</script>
</body>
</html>
